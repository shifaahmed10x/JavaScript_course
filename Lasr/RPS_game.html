<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
</head>

<body>

    <h1>Rock Paper Scissor. </h1>
    <button onclick="play('rock')">Rock</button>
    <button onclick="play('paper')">Paper</button>
    <button onclick="play('scissors')">Scissors</button>
    <button onclick="score.losses=0; score.ties=0; score.wins=0;
    localStorage.removeItem('score');
    alert('SCORE RESET')">Reset Score</button>

    <script>

        let score = JSON.parse(localStorage.getItem('score')) || {
                wins:0,
                losses:0,
                ties:0
            };

        function play(userMove) {
            const moves = ['rock', 'paper', 'scissor'];
            const computerMoves = moves[Math.floor(Math.random() * 3)];
            let result = userMove === computerMoves ? 'Tie' :
                (userMove === 'rock' && computerMoves === 'scissor') ||
                    (userMove === 'paper' && computerMoves === 'rock') ||
                    (userMove === 'scissor' && computerMoves === 'paper') ? 'YOU WIN!' : 'YOU LOSE!';

            if (result === 'YOU WIN!') {
                score.wins += 1;
            }
            else if (result === 'YOU LOSE!') {
                score.losses += 1;
            }
            else if (result === 'Tie') {
                score.ties += 1;
            }

            localStorage.setItem('score',JSON.stringify(score));

            alert(`You: ${userMove} || Computer :${computerMoves} || ${result}\n
            SCORE: Wins :${score.wins}  Lose :${score.losses} Ties :${score.ties}`);
        }
    </script>
</body>

</html>
