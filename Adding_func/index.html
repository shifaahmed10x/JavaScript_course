<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <!-- Sidebar -->
        <div class="sidebar">
            <h2>✨ My App</h2>
            <button class="tab active" data-tab="wallpaper">Wallpaper</button>
            <button class="tab" data-tab="form">Profile Form</button>
            <button class="tab" data-tab="todo">To-Do</button>
        </div>

        <!-- Content -->
        <div class="content">

            <!-- Wallpaper -->
            <div class="tab-content active" id="wallpaper">
                <h3>Select Your Wallpaper</h3>
                <button id="btn-random">Random Pick</button>
                <img id="wallpaper-img" src="img/three.png">
            </div>

            <!-- FORM -->
            <div class="tab-content" id="form">
                <h3>Add your Details</h3>

                <form id="profile-form">
                    <input id="form-name" type="text" placeholder="Name">
                    <input id="form-email" type="email" placeholder="Email">
                    <input id="form-role" type="text" placeholder="Designation">

                    <textarea id="form-info" placeholder="Write something about yourself"></textarea>
                    <p id="char-count">100 / <span>100</span></p>

                    <!-- Upload -->
                    <input id="file-input-profile" type="file" accept="image/*">
                    <div id="upload-btn-profile">Upload Profile</div>

                    <input id="form-submit" type="submit" value="Submit">
                </form>

                <div id="card-container"></div>
            </div>

            <!-- TODO -->
            <div class="tab-content" id="todo">
                <h1> will build soon...
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
